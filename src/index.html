<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Stencil Component Starter</title>
  <style>
    body{
      margin:0;
      overflow: hidden;
      user-select: none;
      font-family: monospace;
    }

    ::-webkit-scrollbar-track
    {
      background-color:#dbdada;
    }

    ::-webkit-scrollbar
    {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-thumb
    {
      background-color:#262626;	
    }

    :root {
      --app-background-color: black;
      --app-level1-color: #353535;
      --app-level2-color:#262626;

      --app-active-color: #4682b4ff;
      --app-highlight-color: #353535;

      --text-color: #7f7f7f;
      --text-highlight: #dbdada;

      --footer: #2171b6;
      --footer-highlight: #437fb4;
    }
    
  </style>

  <script type="module" src="/build/kortxyz-components.esm.js"></script>
  <script nomodule src="/build/kortxyz-components.js"></script>

</head>
<body>
  <div style="flex-direction: column;  display: flex;  height: 100vh;">
    <kortxyz-mapbox 
      accesstoken="pk.eyJ1IjoidGlub2tzIiwiYSI6ImNqbzQycnkycTEwYnczcGt1ZzM3ZWw5eG8ifQ.BFc2DQMWss8JC8pQ9Yco7w"
      mapstyle="mapbox://styles/tinoks/ck45zo9zo0suv1coaaqrsfkhr"
      >
    </kortxyz-mapbox>
    <kortxyz-aggrid style="flex: 1 0 0;"></kortxyz-aggrid>
  </div>
  <script>
      var data;
      var fitID = id => {
        feature = data.features.filter(e=>e.id==id)[0]
        document.querySelector("kortxyz-mapbox").zoomToFeatures(feature)
      }
      var addLayer = data => {
        document.querySelector("kortxyz-aggrid").addData(data.features.map(e=>{return{ id:e.id,...e.properties}}))
        document.querySelector("kortxyz-aggrid").addEventListener("rowClicked", e=>fitID(e.detail))
        console.log(data)
        document.querySelector("kortxyz-mapbox").map.addSource('my-data',{
            'type': 'geojson',
            'data': data
          })
        //document.querySelector("kortxyz-mapbox").addEventListener("mapLoaded",function(){addGeo(data)})
      
      }

      fetch("http://localhost:5555/collections/bygning/items?limit=1000&f=json")
      .then(e=>e.json())
      .then(e=> {
        addLayer(e)
      })

      var addGeo = geodata => {
        
        document.querySelector("kortxyz-mapbox").map.addSource('my-data',{
            'type': 'geojson',
            'data': geodata
          })
        document.querySelector("kortxyz-mapbox").addLayer("layer",'my-data')
      }

  </script>
</body>
</html>
