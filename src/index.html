<html>
<head>
  <meta charset="utf-8">
  <title>Stencil Component Starter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      overflow: hidden;
      user-select: none;
      font-family: monospace;
    }

    ::-webkit-scrollbar-track
    {
      background-color:#dbdada;
    }

    ::-webkit-scrollbar
    {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb
    {
      background-color:#262626;	
    }

    :root {
      --app-background-color: black;
      --app-level1-color: #353535;
      --app-level2-color:#262626;

      --app-active-color: #4682b4ff;
      --app-highlight-color: #353535;

      --text-color: #7f7f7f;
      --text-highlight: #dbdada;

      --footer: #2171b6;
      --footer-highlight: #437fb4;
    }
    row {
      display:flex;
      height:calc(100vh - 20px);
      width:100%;
    }
  </style>

  <script type="module" src="/build/kortxyz-components.esm.js"></script>
  <script nomodule src="/build/kortxyz-components.js"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <row>
    <kortxyz-sidebar>
      <kortxyz-sideitem name="collections" icon="layers">

      </kortxyz-sideitem>
      <kortxyz-sideitem name="styles" icon="sources">
      </kortxyz-sideitem>
      <kortxyz-sideitem name="processes" icon="save_alt">
      </kortxyz-sideitem>
    </kortxyz-sidebar>
    <kortxyz-mapbox accesstoken="pk.eyJ1IjoidGlub2tzIiwiYSI6ImNqM2p5d2hkbTAwM3UzMnBwbWF2NG96Z3IifQ._hWk-eEzh8sNjp3qA_cJuQ" mapstyle="mapbox://styles/tinoks/ck7iqap1664961ip85uc0b23y"></kortxyz-mapbox>
  </row>
  <kortxyz-footer></kortxyz-footer>
</body>
</html>
