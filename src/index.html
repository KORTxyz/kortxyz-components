<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Stencil Component Starter</title>
  <style>
    body{margin:0;}
    .container {
      left:0; top:0;width:100vw;height: 100vh; position: "fixed";
      display:grid;
      grid-template-columns: 40% 60%;
      grid-template-rows: 70% auto;
    }
  </style>

  <script type="module" src="/build/kortxyz-components.esm.js"></script>
  <script nomodule src="/build/kortxyz-components.js"></script>

</head>
<body>
  <div class="container">

    <kortxyz-leaflet></kortxyz-leaflet>
    <kortxyz-mapbox></kortxyz-mapbox>
    <kortxyz-leaflet></kortxyz-leaflet>
    <kortxyz-aggrid class="ag-theme-balham"></kortxyz-aggrid>



  </div>

</body>
</html>
