  <script type="module" src="../dist/kortxyz-components/kortxyz-components.esm.js"></script>

<style>
	body {
		margin: 0
	}

	.grid {
		display: grid;
		height: 100vh;
		grid-template-columns: 1fr 1fr;
		grid-template-rows: 1fr 1fr 1fr;
		gap: 0px 0px;
		grid-template-areas:
			"Map Code"
			"Map Code"
			"Table Table";
	}
</style>

<kortxyz-datastore store="items"
	data="https://demo.kort.xyz/collections/points/items?limit=1000&offset=0"></kortxyz-datastore>

<div class="grid">


	<kortxyz-maplibre style="grid-area: Map;" draw=items basemaps="https://demo.kort.xyz/styles">
		<kortxyz-maplibre-source sourceid="items" store="items" fit>
			<kortxyz-maplibre-layer layerid="items" type="circle" paint='{"circle-color":"red"}' clicklink>
			</kortxyz-maplibre-layer>
		</kortxyz-maplibre-source>
	</kortxyz-maplibre>

	<kortxyz-codemirror style="grid-area: Code;" store="items"></kortxyz-codemirror>


	<kortxyz-aggrid style="grid-area: Table;" store="items" editable></kortxyz-aggrid>

</div>
